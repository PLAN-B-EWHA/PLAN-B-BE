# Application Name
spring.application.name=MyExpressionFriend

# Server Port
server.port=${PORT:8080}

# Database Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.storage.base-path=uploads

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-with-zone-id=false

# JWT Token Expiration
jwt.access-token-expire-minutes=30
jwt.refresh-token-expire-minutes=10080

# JWT Cookie Common Settings
jwt.cookie.name=refreshToken
jwt.cookie.max-age=604800
jwt.cookie.path=/
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
jwt.cookie.http-only=true
jwt.cookie.same-site=Lax

# Active Profile (default: dev)
spring.profiles.active=${SPRING_PROFILE:dev}

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# LLM (Gemini)
llm.gemini.enabled=${LLM_GEMINI_ENABLED:false}
llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
llm.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
llm.gemini.timeout-ms=${GEMINI_TIMEOUT_MS:15000}

# Report scheduler
report.scheduler.enabled=${REPORT_SCHEDULER_ENABLED:true}
report.scheduler.fixed-delay-ms=${REPORT_SCHEDULER_DELAY_MS:60000}

management.endpoints.web.exposure.include=health