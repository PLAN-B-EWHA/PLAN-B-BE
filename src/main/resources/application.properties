# Application Name
spring.application.name=MyExpressionFriend

# Server Port
server.port=${PORT:8080}

# Database Driver
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}

# JPA Configuration
# ddl-auto는 프로파일별로 오버라이드됩니다 (application-dev.properties, application-prod.properties 참조)
spring.jpa.hibernate.ddl-auto=update
# SQL 로그는 개발 환경에서만 활성화 (프로덕션 성능/보안 위험)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.storage.base-path=uploads

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-with-zone-id=false

# JWT Secret
jwt.secret=${JWT_SECRET}

# JWT Token Expiration
jwt.access-token-expire-minutes=30
jwt.refresh-token-expire-minutes=10080

# JWT Cookie Common Settings
jwt.cookie.name=refreshToken
jwt.cookie.max-age=604800
jwt.cookie.path=/
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
jwt.cookie.http-only=true
jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}

# Active Profile
spring.profiles.active=${SPRING_PROFILE:dev}

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# LLM (Gemini)
llm.gemini.enabled=${LLM_GEMINI_ENABLED:false}
llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
llm.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
llm.gemini.timeout-ms=${GEMINI_TIMEOUT_MS:120000}

# Report scheduler
report.scheduler.enabled=${REPORT_SCHEDULER_ENABLED:true}
report.scheduler.fixed-delay-ms=${REPORT_SCHEDULER_DELAY_MS:60000}

management.endpoints.web.exposure.include=health

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

# Cache
spring.cache.type=${CACHE_TYPE:caffeine}
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=3600s

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
